name: e2e-a3

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  e2e-p0:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - name: Run A3 prelaunch checks
        env:
          MCP_ENDPOINT: ${{ secrets.A3_MCP_ENDPOINT }}
          A3_ADMIN_SESSION_TOKEN: ${{ secrets.A3_ADMIN_SESSION_TOKEN }}
          A3_PARENT_SESSION_TOKEN: ${{ secrets.A3_PARENT_SESSION_TOKEN }}
          A3_STUDENT_SESSION_TOKEN: ${{ secrets.A3_STUDENT_SESSION_TOKEN }}
          A3_STUDENT_ID: ${{ secrets.A3_STUDENT_ID }}
          A3_GUARDIAN_ID: ${{ secrets.A3_GUARDIAN_ID }}
          A3_FAMILY_ID: ${{ secrets.A3_FAMILY_ID }}
        run: |
          npm run test:e2e:p0:clean
          npm run test:e2e:p0
